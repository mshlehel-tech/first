<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>AJAX Квадрат Числа</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      input {
        padding: 10px;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
      }
      #result {
        margin-top: 20px;
        font-weight: bold;
        color: blue;
        font-size: 20px;
      }

    <h2>Введіть число для обчислення квадрата:</h2>
    <input type="number" id="numberInput" placeholder="Наприклад: 5" />
    <button id="sendBtn">Порахувати через AJAX</button>

    <div id="result"></div>

    <script src="/js/script.js"></script>
  </body>
