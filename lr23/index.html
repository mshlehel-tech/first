<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моя друга гра</title>
    <!-- Підключення jQuery та jQuery UI -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f9f9f9;
      }

      /* Стилі стартового екрану */
      #start-screen {
        text-align: center;
        border: 4px solid #000;
        padding: 50px 100px;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      #start-screen h1 {
        color: #d9534f;
        font-size: 3em;
        margin-bottom: 40px;
      }

      .btn {
        background-color: #5b9bd5;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2em;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .btn:hover {
        background-color: #4682b4;
      }

      #category-select {
        font-size: 1.2em;
        padding: 10px;
        margin-bottom: 20px;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }

      /* Стилі ігрового екрану */
      #game-screen {
        display: none;
        border: 4px solid #000;
        padding: 30px;
        background-color: #fff;
        display: flex;
        gap: 50px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      /* Ігрове поле (5x5) */
      #game-board {
        display: grid;
        grid-template-columns: repeat(5, 100px);
        grid-template-rows: repeat(5, 100px);
        gap: 2px;
        border: 2px solid #000;
        padding: 2px;
      }

      .cell {
        width: 100px;
        height: 100px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        background-color: #eee;
      }

      .cell img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Права панель з поточною картинкою */
      #controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding-top: 20px;
      }

      #target-area {
        width: 120px;
        height: 120px;
        border: 2px solid #5b9bd5;
        padding: 5px;
        background-color: #fff;
      }

      #target-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        cursor: grab;
        z-index: 1000;
      }

      #target-image:active {
        cursor: grabbing;
      }

      /* Клас для знайдених картинок */
      .matched {
        opacity: 0.3;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Стартовий екран -->
    <div id="start-screen">
      <h1>Моя друга гра</h1>
      <select id="category-select">
        <option value="animals">Тварини</option>
        <option value="insects">Комахи</option>
        <option value="fishes">Риби</option>
      </select>
      <button id="start-btn" class="btn">Почати гру</button>
    </div>

    <!-- Ігровий екран -->
    <div id="game-screen" style="display: none">
      <div id="game-board"></div>
      <div id="controls">
        <button id="restart-btn" class="btn">Почати з початку</button>
        <div id="target-area">
          <img
            id="target-image"
            src=""
            alt="Шукана картинка"
            style="display: none"
          />
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        let currentImages = []; // Картинки, що на полі (25 шт)
        let remainingImages = [];
        const TOTAL_CELLS = 25;
        const TOTAL_DB_IMAGES = 50;

        // Функція перемішування масиву (алгоритм Фішера-Йейтса)
        function shuffle(array) {
          for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
          }
          return array;
        }

        // Запуск гри
        $("#start-btn").click(function () {
          $("#start-screen").hide();
          $("#game-screen").css("display", "flex");
          initGame();
        });

        // Перезапуск гри
        $("#restart-btn").click(function () {
          initGame();
        });

        function initGame() {
          const category = $("#category-select").val();
          let allImagesDb = [];

          // Формуємо "базу" з 50 картинок обраного розділу
          for (let i = 1; i <= TOTAL_DB_IMAGES; i++) {
            allImagesDb.push(`images/${category}/${i}.jpg`);
          }

          // Вибираємо 25 випадкових унікальних картинок для поля
          shuffle(allImagesDb);
          currentImages = allImagesDb.slice(0, TOTAL_CELLS);
          remainingImages = [...currentImages]; // Копіюємо для пошуку
          shuffle(remainingImages); // Перемішуємо порядок пошуку

          renderBoard();
          setNextTarget();
        }

        function renderBoard() {
          const board = $("#game-board");
          board.empty();

          // Розміщуємо 25 картинок на ігровому полі
          currentImages.forEach(function (imgSrc, index) {
            const cell = $(`<div class="cell"></div>`);
            const img = $(`<img src="${imgSrc}" data-id="${imgSrc}">`);

            // Робимо комірку місцем, куди можна кинути елемент (droppable)
            cell.append(img);
            cell.droppable({
              accept: "#target-image", // Приймаємо тільки поточну картинку
              drop: handleDrop,
            });

            board.append(cell);
          });
        }

        function setNextTarget() {
          if (remainingImages.length === 0) {
            // Якщо всі знайдені - перемога
            setTimeout(function () {
              alert("Вітаємо! Ви успішно завершили гру!");
              $("#game-screen").hide();
              $("#start-screen").show();
            }, 300);
            return;
          }

          // Беремо наступну картинку для пошуку
          const nextSrc = remainingImages.pop();
          const targetImg = $("#target-image");

          targetImg.attr("src", nextSrc).attr("data-id", nextSrc).show();

          // Робимо картинку перетягуваною (draggable)
          targetImg.draggable({
            revert: "invalid", // Повертати на місце, якщо кинуто мимо
            helper: "clone", // Перетягувати копію, щоб оригінал не стрибав
            cursor: "grabbing",
            zIndex: 100,
          });
        }

        // Обробник події "кидання" картинки
        function handleDrop(event, ui) {
          const droppedOnImg = $(this).find("img");
          const targetId = ui.draggable.attr("data-id");
          const cellId = droppedOnImg.attr("data-id");

          // Перевіряємо, чи співпадають картинки
          if (targetId === cellId) {
            // Збіг вірний
            droppedOnImg.addClass("matched"); // Відзначаємо на полі
            $(this).droppable("disable"); // Вимикаємо droppable для цієї комірки
            ui.draggable.hide(); // Ховаємо поточну картинку

            // Завантажуємо нову картинку
            setNextTarget();
          } else {
            // Невірний збіг (картинка автоматично повернеться завдяки revert: 'invalid' в draggable,
            // але ми можемо повернути 'draggable' на своє місце, якщо ловимо його як 'valid' і скасовуємо)
            ui.draggable.draggable("option", "revert", true);
          }
        }
      });
    </script>
  </body>
</html>
